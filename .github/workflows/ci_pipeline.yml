# ci_pipeline.yml - Lab 4: GitHub Actions CI for ML

name: ML Training CI Pipeline

on:
  push:
    paths: ['src/**','data/**','configs/**']   # trigger pipeline only when src, data, or config files change

  schedule:
    - cron: '0 2 * * *'   # run automatically every day at 02:00 UTC

  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  MODEL_VERSION: ${{ github.sha }}   # use git commit SHA as model version (unique versioning)

jobs:

  train:
    name: Train Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # checkout repository code

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'   # cache dependencies for faster builds

      - name: Install dependencies
        run: pip install -r requirements.txt   # install required Python packages

      - name: Run training
        run: python train.py   # execute training pipeline
        env:
          MODEL_VERSION: ${{ env.MODEL_VERSION }}

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.sha }}   # unique model name using commit SHA
          path: model.pkl                # upload trained model file
          retention-days: 30             # store artifact for 30 days


  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    needs: train   # ensures validation runs only after training job completes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt   # install dependencies again for validation job

      - uses: actions/download-artifact@v4
        with:
          name: model-${{ github.sha }}   # download trained model from previous job

      - name: Run validation gates
        run: python validate.py   # run validation checks (accuracy, fairness, etc.)


  register:
    name: Register Model
    runs-on: ubuntu-latest
    needs: validate   # run only after validation succeeds
    if: github.ref == 'refs/heads/main'   # execute only on main branch
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Register model
        run: python -c "print('Registered: iris_classifier @ Staging')"   # simulate model registration
