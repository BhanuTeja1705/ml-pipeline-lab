# cd_deploy.yml - Lab 5: Canary Deployment

name: ML Model CD - Canary Deployment

on:
  # Trigger when CI workflow completes
  workflow_run:
    workflows: ["ML Training CI Pipeline"]   # run this CD pipeline after CI pipeline completes
    types: [completed]   # trigger only when workflow finishes
    branches: [main]   # only for main branch

jobs:

  canary_deploy:
    name: Deploy Canary (10% traffic)
    runs-on: ubuntu-latest

    # Run only if CI succeeded
    if: github.event.workflow_run.conclusion == 'success'   # ensures deployment only happens if CI passed

    outputs:
      canary_healthy: ${{ steps.health_check.outputs.healthy }}
      model_version: ${{ steps.deploy.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Deploy canary at 10% traffic
        id: deploy
        run: |
          python -c "
          import os
          version = 'v-abc1234'
          print('[DEPLOY] Canary 10% - version:', version)

          # Writing version output (passes model version to next jobs)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('version=' + version + chr(10))
          "

      - name: Wait for metrics to stabilize
        run: |
          echo 'Waiting for canary metrics...'
          sleep 10   # wait time to observe performance before decision

      - name: Check canary health
        id: health_check
        run: |
          python -c "
          import os, random

          random.seed(42)
          accuracy = round(random.uniform(0.87, 0.94), 4)
          latency  = round(random.uniform(45, 110), 1)

          print('[METRICS] accuracy:', accuracy, 'latency:', latency, 'ms')

          healthy = accuracy >= 0.85 and latency <= 200
          print('[METRICS] healthy:', healthy)

          # Writing health output (used to decide rollout or rollback)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('healthy=' + str(healthy).lower() + chr(10))
          "


  full_rollout:
    name: Promote to 100% Traffic
    runs-on: ubuntu-latest
    needs: canary_deploy

    # Run only if canary is healthy
    if: needs.canary_deploy.outputs.canary_healthy == 'true'   # promote model if canary test passes

    steps:
      - run: |
          echo '[PROMOTE] 100% traffic -> new model'
          echo '[PROMOTE] Stage: Staging -> Production'


  rollback:
    name: Auto Rollback
    runs-on: ubuntu-latest
    needs: canary_deploy

    # Run only if canary failed
    if: needs.canary_deploy.outputs.canary_healthy != 'true'   # rollback if canary fails

    steps:
      - run: |
          echo '[ROLLBACK] Canary FAILED - reverting to stable model'
          echo '[ALERT] On-call team notified'
